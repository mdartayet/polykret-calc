<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polykret | Material Calculator (Bekaert Standard)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #004d80;
            --secondary: #00a1e1;
            --accent: #ffcc00;
            --bg: #f4f7f9;
            --card: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        header img {
            max-width: 200px;
        }

        h1 { color: var(--primary); margin: 10px 0 5px; font-weight: 600; }
        h2 { color: var(--secondary); font-size: 1.2rem; border-left: 4px solid var(--primary); padding-left: 10px; margin-top: 30px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .rack-grid {
            background: #fdfdfd;
            padding: 15px;
            border: 1px dashed #ccc;
            border-radius: 8px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 30px;
        }

        button:hover { background: var(--secondary); }

        #results {
            margin-top: 40px;
            padding: 25px;
            background: #eef6fc;
            border-radius: 10px;
            display: none;
        }

        .util-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .util-ok { background: #d4edda; color: #155724; }
        .util-fail { background: #f8d7da; color: #721c24; }

        .footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>POLY KRET</h1>
        <p>Industrial Floor Design Assistance (TR34 Compliant)</p>
    </header>

    <form id="calcForm">
        <h2>Información del Proyecto</h2>
        <div class="form-grid">
            <div class="input-group">
                <label>Proyecto</label>
                <input type="text" name="project_name" value="PROMART Guayaquil">
            </div>
            <div class="input-group">
                <label>Cliente</label>
                <input type="text" name="client_name" value="Industrial Client">
            </div>
        </div>

        <h2>Parámetros de Diseño (Floor Information)</h2>
        <div class="form-grid">
            <div class="input-group">
                <label>Espesor de Losa (h) [mm]</label>
                <input type="number" name="thickness" value="200" required>
            </div>
            <div class="input-group">
                <label>Resistencia Concreto (f'c) [kg/cm²]</label>
                <select name="fc">
                    <option value="210">C17/21 (210 kg/cm²)</option>
                    <option value="240">C20/24 (240 kg/cm²)</option>
                    <option value="280" selected>C23/28 (280 kg/cm²)</option>
                    <option value="350">C28/35 (350 kg/cm²)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Suelo (CBR) [%]</label>
                <input type="number" name="cbr" value="30" step="0.1" required>
            </div>
            <div class="input-group">
                <label>Espaciamiento Juntas (LxW) [m]</label>
                <input type="text" name="joint_spacing" value="4.0 x 4.0">
            </div>
        </div>

        <h2>Refuerzo con Fibra Dramix®</h2>
        <div class="form-grid">
            <div class="input-group">
                <label>Tipo de Fibra</label>
                <select name="fiber_type">
                    <option value="4D 80/60BGE">Dramix® 4D 80/60BGE (Optimized)</option>
                    <option value="3D 80/60BG">Dramix® 3D 80/60BG</option>
                    <option value="5D 65/60BG">Dramix® 5D 65/60BG</option>
                </select>
            </div>
            <div class="input-group">
                <label>Dosificación [kg/m³]</label>
                <input type="number" name="dosage" value="22" step="0.5" required>
            </div>
        </div>

        <h2>Cargas (Pallet Racking)</h2>
        <div class="rack-grid">
            <div class="form-grid">
                <div class="input-group">
                    <label>Carga por Pata (Single Leg) [kN]</label>
                    <input type="number" name="load_f" value="77" required>
                </div>
                <div class="input-group">
                    <label>Placa Base (a x b) [mm]</label>
                    <div style="display:flex;gap:5px;">
                        <input type="number" name="plate_x" value="150">
                        <input type="number" name="plate_y" value="150">
                    </div>
                </div>
            </div>
        </div>

        <button type="submit">Calcular y Generar Resultados</button>
    </form>

    <div id="results">
        <h2 style="margin-top:0">Resultados del Análisis</h2>
        <div id="resultsContent"></div>
        <form action="/generate-pdf" method="POST" id="pdfForm" style="margin-top:20px;">
            <!-- Hidden inputs will be filled by JS -->
            <div id="hiddenInputs"></div>
            <button type="submit" style="background:#28a745">Descargar Memoria Técnica PDF</button>
        </form>
    </div>

    <div class="footer">
        © 2026 Polykret | Basado en Estándares TR34 y Bekaert SoG | Solo para uso profesional.
    </div>
</div>

<script>
    const form = document.getElementById('calcForm');
    const resultsDiv = document.getElementById('results');
    const resultsContent = document.getElementById('resultsContent');
    const hiddenInputs = document.getElementById('hiddenInputs');

    form.onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        const response = await fetch('/calculate', {
            method: 'POST',
            body: formData
        });
        const data = await response.json();

        resultsContent.innerHTML = `
            <div class="form-grid">
                <div>
                    <p><strong>Módulo K (Suelo):</strong> ${data.k_val} N/mm³</p>
                    <p><strong>Longitud Elástica:</strong> ${data.lel} mm</p>
                </div>
                <div>
                    <p><strong>Pu Centro (ULS):</strong> ${data.m_rd_total} kNm/m</p>
                    <p><strong>Pu Fisuración:</strong> ${data.m_rd_c} kNm/m</p>
                </div>
            </div>
            <h3>Verificaciones de Utilización</h3>
            <table style="width:100%; text-align:left; border-collapse:collapse;">
                <tr style="border-bottom:1px solid #ccc"><th>Posición</th><th>Momento (kNm/m)</th><th>Utilización</th></tr>
                <tr><td>Centro</td><td>${data.m_ed_center}</td><td><span class="util-tag ${data.utilization <= 100 ? 'util-ok' : 'util-fail'}">${data.utilization}%</span></td></tr>
                <tr><td>Juntas</td><td>${data.m_ed_joint}</td><td><span class="util-tag ${data.utilization_joint <= 100 ? 'util-ok' : 'util-fail'}">${data.utilization_joint}%</span></td></tr>
                <tr><td>Bordes</td><td>${data.m_ed_edge}</td><td><span class="util-tag ${data.utilization_edge <= 100 ? 'util-ok' : 'util-fail'}">${data.utilization_edge}%</span></td></tr>
                <tr><td>Suelo</td><td>${data.p_ed_soil} kN/m²</td><td><span class="util-tag ${data.utilization_soil <= 100 ? 'util-ok' : 'util-fail'}">${data.utilization_soil}%</span></td></tr>
            </table>
        `;
        
        resultsDiv.style.display = 'block';

        // Prepare PDF form
        hiddenInputs.innerHTML = '';
        for (let pair of formData.entries()) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = pair[0];
            input.value = pair[1];
            hiddenInputs.appendChild(input);
        }
    };
</script>

</body>
</html>
